<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Bookworm & Class-Off Camel</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #3e2828;
            --pixel-accent: #a58f8f; /* 稍微調亮一點的棕色 */
            --pixel-text: #2e2525;
            --pixel-dark: #2a1a1a;
            --bg-overlay: rgba(255, 255, 255, 0.05); /* 極淡的遮罩 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        /* 核心修改：使用你提供的 background.png */
        .background {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }
        
        /* 輕微的像素化網格裝飾，不遮擋原圖 */
        .background::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, var(--bg-overlay) 0px, var(--bg-overlay) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(90deg, var(--bg-overlay) 0px, var(--bg-overlay) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
        }

        /* 角色容器 */
        .character-container {
            position: absolute;
            bottom: 25vh;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 5%;
            pointer-events: none; 
            z-index: 5;
        }

        .character {
            width: 42vw;
            max-width: 280px;
            height: auto;
            transition: all 0.25s steps(4); /* 增加像素感動畫 */
            filter: brightness(0.7) contrast(0.9);
            transform: scale(0.9);
            opacity: 0.8;
        }

        /* 活躍角色效果 */
        .character.active {
            filter: brightness(1) contrast(1.1) drop-shadow(4px 4px 0px rgba(0,0,0,0.2));
            transform: scale(1.05);
            opacity: 1;
            z-index: 10;
        }

        /* 像素對話框 */
        .pixel-dialogue {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            min-height: 130px;
            background: #ffffff;
            border: 4px solid var(--pixel-border);
            box-shadow: 
                6px 6px 0px 0px rgba(0, 0, 0, 0.15),
                inset -4px -4px 0px #d1d1d1;
            padding: 20px;
            z-index: 20;
            cursor: pointer;
        }

        .name-tag {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background: var(--pixel-border);
            padding: 2px 12px;
            position: absolute;
            top: -20px;
            left: 12px;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }

        .message {
            font-size: 26px;
            color: var(--pixel-text);
            line-height: 1.1;
            margin-top: 8px;
        }

        .next-hint {
            position: absolute;
            right: 15px;
            bottom: 10px;
            font-size: 18px;
            color: #888;
            animation: blink 0.8s steps(2) infinite;
        }

        @keyframes blink {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 任務總結 */
        #summary-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(42, 26, 26, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .mission-box {
            border: 6px solid #fff;
            background: #eef6fc;
            padding: 30px;
            width: 85%;
            text-align: center;
            box-shadow: 8px 8px 0 var(--pixel-dark);
        }

        .btn-start {
            font-family: 'VT323', monospace;
            font-size: 32px;
            background: #ffcc00;
            border: 4px solid var(--pixel-border);
            padding: 10px 30px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--pixel-border);
        }

        .btn-start:active {
            box-shadow: 0px 0px 0 var(--pixel-border);
            transform: translate(2px, 2px);
        }

    </style>
</head>
<body>

    <div class="background"></div>

    <div class="character-container">
        <img id="classoff-camel" class="character" src="Camel.png" alt="Class-Off Camel" onerror="this.src='https://placehold.co/400x500/d2b48c/3e2828?text=Camel'">
        <img id="bookworm" class="character" src="Bookworm.png" alt="Bookworm" onerror="this.src='https://placehold.co/400x500/9ac2d4/3e2828?text=Bookworm'">
    </div>

    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">Class-Off Camel</div>
        <div class="message" id="message-text">幾時落堂... 幾時落堂... (When end the class...)</div>
        <div class="next-hint">TAP TO CONTINUE</div>
    </div>

    <div id="summary-screen">
        <div class="mission-box">
            <h1 style="color:#2a1a1a; margin-bottom:15px;">✦ MISSION BRIEF ✦</h1>
            <p style="font-size:22px; color:#444;">It's been 4 hours...<br>The camel is thirsty!</p>
            <p style="font-size:24px; font-weight:bold; margin:15px 0;">➤ Help him get a drink!</p>
            <button class="btn-start" id="start-game-btn">GO! ➔</button>
        </div>
    </div>

    <script>
        const story = [
            { name: "Class-Off Camel", text: "When end the class... When end the class...", active: "classoff-camel" },
            { name: "Class-Off Camel", text: "When end the class... When end the class...x100", active: "classoff-camel" },
            { name: "Bookworm", text: "Why is he here just saying his own name?", active: "bookworm" },
            { name: "Bookworm", text: "(listen carefully...)", active: "bookworm" },
            { name: "Class-Off Camel", text: "When end the class... When end the class...x100", active: "classoff-camel" },
            { name: "Bookworm", text: "Oh! He's not saying his name (幾時駱駝), he's asking when class ends (幾時落堂)!", active: "bookworm" },
            { name: "Class-Off Camel", text: "Did you know we've already been in class for four hours?", active: "classoff-camel" },
            { name: "Bookworm", text: "...", active: "bookworm" },
            { name: "Class-Off Camel", text: "Could you help me go out and get some drink?", active: "classoff-camel" },
            { name: "Bookworm", text: "o…ok", active: "bookworm" }
        ];

        let currentLine = 0;
        const dialogueBox = document.getElementById('dialogue-box');
        const speakerNameEl = document.getElementById('speaker-name');
        const messageTextEl = document.getElementById('message-text');
        const camelImg = document.getElementById('classoff-camel');
        const bookwormImg = document.getElementById('bookworm');
        const summaryScreen = document.getElementById('summary-screen');
        const startBtn = document.getElementById('start-game-btn');

        function updateUI() {
            if (currentLine < story.length) {
                const line = story[currentLine];
                speakerNameEl.innerText = line.name;
                messageTextEl.innerText = line.text;
                
                camelImg.classList.toggle('active', line.active === 'classoff-camel');
                bookwormImg.classList.toggle('active', line.active === 'bookworm');
            } else {
                dialogueBox.style.display = 'none';
                summaryScreen.style.display = 'flex';
            }
        }

        document.body.addEventListener('click', (e) => {
            if (summaryScreen.style.display === 'flex') return;
            currentLine++;
            updateUI();
        });

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            window.location.href = 'camera_game.html';
        });

        window.addEventListener('load', updateUI);
    </script>
</body>
</html>
