<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIXEL MATCH - 八位元任務</title>
    <style>
        /* 像素風必備：復古字體與無鋸齒渲染 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 關鍵：強制像素化渲染 */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: pixelated; /* for Chrome */
            image-rendering: crisp-edges; /* for Firefox */
            image-rendering: pixelated; /* for modern browsers */
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Press Start 2P', cursive, monospace;
            background: #0a0c12; /* 極深灰藍背景，模仿老式CRT */
            color: #b0f0ff;      /* 像素青 */
            -webkit-tap-highlight-color: transparent;
            font-size: 12px;     /* 基準字體小一點，維持像素感 */
        }

        /* 復古掃描線與網格 */
        .pixel-scan {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.03) 0px, rgba(0, 255, 255, 0.03) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 15;
        }

        .pixel-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(80, 200, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(80, 200, 255, 0.08) 1px, transparent 1px);
            background-size: 12px 12px;
            pointer-events: none;
            z-index: 14;
        }

        /* CRT 類比發光效果 */
        .crt-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 200, 0.05) 0%, transparent 80%);
            pointer-events: none;
            z-index: 13;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.4; }
            100% { opacity: 0.7; }
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 12px;
            padding-bottom: 70px;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        /* 像素面板 — 粗邊框 + 內陰影模仿 8-bit 風格 */
        .pixel-panel {
            background: #0f121f;
            border: 3px solid #2fbfdf;
            border-style: solid;
            box-shadow: inset 0 0 0 1px #1f7f9f, 3px 3px 0px 0px #00000066;
            padding: 12px;
            margin-bottom: 14px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .level-info span {
            font-size: 10px;
            letter-spacing: 1px;
            background: #00000066;
            padding: 4px 6px;
        }

        .energy-container {
            margin-bottom: 14px;
        }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 6px;
            color: #ffb347;
            font-weight: bold;
        }
        .energy-bar-bg {
            width: 100%;
            height: 14px;
            background: #1e1f2c;
            border: 2px solid #4a6a7a;
            box-shadow: inset 0 0 0 1px #000;
        }
        .energy-fill {
            width: 100%;
            height: 100%;
            background: #ff5f3f;  /* 像素橘紅 */
            transition: width 0.2s steps(6);
            box-shadow: inset 0 0 4px #ffaa88;
        }

        .location-header {
            text-align: center;
            background: #0a1022;
            border-color: #ffaa66;
        }
        .location-name {
            font-size: 18px;
            letter-spacing: 2px;
            color: #ffcc77;
            text-shadow: 2px 2px 0 #4a1a2a;
        }
        .level-badge {
            font-size: 9px;
            margin-top: 8px;
            color: #9fd3ff;
        }

        .timer {
            font-size: 32px;
            font-weight: bold;
            color: #f7d44a;
            text-shadow: 3px 3px 0 #aa2e1e;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 3px;
        }

        .section-title {
            color: #ffcc88;
            margin-bottom: 10px;
            font-size: 11px;
            letter-spacing: 1px;
            border-left: 4px solid #ff9966;
            padding-left: 8px;
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #03050b;
            border: 3px solid #3a7b8c;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 0 2px #00000044;
        }
        .image-container img, .image-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            color: #6e8f9f;
            font-size: 10px;
        }
        .placeholder i {
            font-size: 28px;
            display: inline-block;
            font-style: normal;
            filter: drop-shadow(0 0 2px cyan);
        }

        /* 像素計量條 */
        .similarity-meter {
            margin-top: 8px;
            background: #0d1020;
            border: 2px solid #3f8faf;
            padding: 8px;
        }
        .meter-label {
            font-size: 9px;
            color: #ffbb88;
        }
        .meter-bar {
            width: 100%;
            height: 10px;
            background: #10141f;
            border: 2px solid #6a8a9a;
            margin: 5px 0;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.15s steps(8);
        }
        .meter-fill.high { background: #77ff77; box-shadow: 0 0 2px #00ff00; }
        .meter-fill.medium { background: #ffdd77; }
        .meter-fill.low { background: #ff8866; }

        /* 像素按鈕 */
        .btn {
            width: 100%;
            padding: 12px 8px;
            font-size: 11px;
            font-family: 'Press Start 2P', monospace;
            background: #1f2937;
            border: 3px solid #5fafcf;
            color: #dfefff;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.05s linear;
            box-shadow: inset -2px -2px 0px #0f1a22, inset 2px 2px 0px #8fcbff;
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: inset 2px 2px 0px #0f1a22;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none;
            filter: grayscale(0.3);
            cursor: not-allowed;
        }

        .photo-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .photo-actions .btn {
            margin-top: 0;
        }

        /* BOSS 戰按鈕像素閃爍 */
        #bossBtn {
            background: #aa2e2e;
            border-color: #ffaa66;
            color: #ffffaa;
            animation: pixelBlink 0.8s steps(2) infinite;
            display: none;
        }
        @keyframes pixelBlink {
            0% { border-color: #ffaa66; background: #aa2e2e; }
            50% { border-color: #ffdd88; background: #cc4444; }
            100% { border-color: #ffaa66; background: #aa2e2e; }
        }

        .back-button {
            position: fixed;
            top: 12px;
            left: 8px;
            z-index: 200;
        }
        .back-button a {
            color: #7fdfbf;
            text-decoration: none;
            font-size: 9px;
            background: #0f1222;
            border: 2px solid #2fafaf;
            padding: 5px 8px;
            font-family: 'Press Start 2P', monospace;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #01010b;
            border: 3px solid #ffbb66;
            padding: 8px 16px;
            font-size: 10px;
            z-index: 1000;
            display: none;
            text-align: center;
            white-space: nowrap;
            color: #ffdd99;
            font-family: monospace;
            box-shadow: 4px 4px 0 #2a2a2a;
        }
        .toast.show { display: block; animation: pixelToast 0.2s steps(3); }
        @keyframes pixelToast {
            from { opacity: 0; bottom: 10px; }
            to { opacity: 1; bottom: 30px; }
        }

        /* 相機狀態 */
        #cameraStatus.online { color: #66ff66; text-shadow: 0 0 2px #00ff00; }
        #cameraStatus.offline { color: #cc8866; }

        /* 自適應捲軸隱藏 (保持乾淨) */
        .game-container::-webkit-scrollbar {
            width: 8px;
            background: #03050b;
        }
        .game-container::-webkit-scrollbar-thumb {
            background: #3f7f9f;
            border: 1px solid #0f1f2f;
        }
    </style>
</head>
<body>
    <div class="pixel-scan"></div>
    <div class="pixel-grid"></div>
    <div class="crt-glow"></div>

    <div class="back-button"><a href="index.html">◣ EXIT</a></div>

    <div class="game-container">
        <div class="pixel-panel status-bar">
            <div class="level-info"><span>⚡ PIXEL ZONE</span></div>
            <div class="timer" id="timer">--:--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>◈ NEGATIVE ENERGY ◈</span><span id="energyPercent">20%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 20%"></div></div>
        </div>

        <div class="pixel-panel location-header">
            <div class="location-name">▲ TRIANGLE RUINS ▲</div>
            <div class="level-badge" id="levelInfo">LV 1 / 2 | TIME 5:00</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">🎯 TARGET SYMBOL</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="display:none;">
                <div class="placeholder" id="targetPlaceholder"><i>◈</i><p>LOADING DATA...</p></div>
            </div>
        </div>

        <div class="similarity-meter" id="similarityMeter" style="display:none">
            <div class="meter-label">▼ MATCH RATE ▼</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill" style="width:0%"></div></div>
            <div id="similarityText" style="text-align:right; font-size: 10px; margin-top: 4px;">0%</div>
        </div>

        <div class="pixel-panel">
            <div class="section-title">📷 PIXEL CAMERA</div>
            <div class="image-container">
                <video id="video" autoplay playsinline style="display: none;"></video>
                <canvas id="canvas" style="display:none"></canvas>
                <div class="placeholder" id="cameraPlaceholder"><i>📺</i><p>CAMERA OFFLINE</p></div>
            </div>
            <div class="photo-actions">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 CAPTURE</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled>⬆ SUBMIT</button>
            </div>
            <div id="cameraStatus" class="offline" style="text-align:center; margin-top: 12px; font-size: 9px;">OFFLINE</div>
        </div>

        <div class="bottom-buttons">
            <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none">⏭ NEXT LEVEL</button>
            <button class="btn" id="bossBtn" onclick="goToBoss()">🔥 FIGHT BOSS 🔥</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========= 像素風格 AR 匹配核心 =========
        // 使用可靠的 pixel 主題圖片 (picsum 確保載入, 加上像素感)
        const LEVEL_IMAGES = [
            "https://picsum.photos/id/20/400/300",   // 書籍風格
            "https://picsum.photos/id/24/400/300"    // 古老建築
        ];
        
        const LEVEL_TIMES = [300, 240];   // 5分 / 4分
        const MAX_REDUCTION_PER_LEVEL = 4;
        
        function getReductionBySimilarity(similarity) {
            if (similarity >= 95) return 4.0;
            if (similarity >= 90) return 3.5;
            if (similarity >= 85) return 3.0;
            if (similarity >= 80) return 2.5;
            if (similarity >= 75) return 2.0;
            if (similarity >= 70) return 1.5;
            if (similarity >= 65) return 1.0;
            if (similarity >= 60) return 0.5;
            return 0;
        }
        
        let gameState = {
            currentLevel: 1,
            energy: 20,
            timer: 0,
            timerInterval: null,
            camera: null,
            cameraActive: false,
            currentPhoto: null,
            currentSimilarity: 0,
            isSubmitted: false,
            levelCompleted: false,
            gameActive: false
        };
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const similarityMeter = document.getElementById('similarityMeter');
        const similarityFill = document.getElementById('similarityFill');
        const similarityText = document.getElementById('similarityText');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const submitBtn = document.getElementById('submitBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const bossBtn = document.getElementById('bossBtn');
        const timerDisplay = document.getElementById('timer');
        const levelInfo = document.getElementById('levelInfo');
        const energyFill = document.getElementById('energyFill');
        const energyPercent = document.getElementById('energyPercent');
        const cameraPlaceholderDiv = document.getElementById('cameraPlaceholder');
        
        window.addEventListener('load', () => {
            showToast("PRESS START | ALLOW CAMERA");
            startMatching();
        });
        
        async function startMatching() {
            await initCamera();
            startLevel();
        }
        
        async function initCamera() {
            try {
                showToast("📡 REQUESTING CAMERA...");
                const constraints = { video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'environment' } };
                gameState.camera = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = gameState.camera;
                await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                video.style.display = 'block';
                if (cameraPlaceholderDiv) cameraPlaceholderDiv.style.display = 'none';
                // 設定 canvas 尺寸並加上像素化處理
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                gameState.cameraActive = true;
                const cameraStatusSpan = document.getElementById('cameraStatus');
                if (cameraStatusSpan) {
                    cameraStatusSpan.textContent = 'ONLINE | 8-BIT MODE';
                    cameraStatusSpan.className = 'online';
                }
                if (takePhotoBtn) takePhotoBtn.disabled = false;
                showToast("✅ PIXEL CAMERA READY");
            } catch (error) {
                console.error("Camera error:", error);
                showToast("❌ CAMERA BLOCKED - DEMO MODE ACTIVE");
                gameState.cameraActive = false;
                // 仍然允許 DEMO 模式遊玩
                if (takePhotoBtn) takePhotoBtn.disabled = false;
                const cameraStatusSpan = document.getElementById('cameraStatus');
                if(cameraStatusSpan) cameraStatusSpan.textContent = 'DEMO MODE (NO CAM)';
            }
        }
        
        function startLevel() {
            const levelIdx = gameState.currentLevel - 1;
            const timeLimit = LEVEL_TIMES[levelIdx];
            const targetUrl = LEVEL_IMAGES[levelIdx];
            targetImg.src = targetUrl;
            targetImg.onload = () => {
                targetImg.style.display = 'block';
                targetPlaceholder.style.display = 'none';
            };
            targetImg.onerror = () => {
                // fallback 像素佔位
                targetImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23336699'/%3E%3Cpolygon points='50,20 80,80 20,80' fill='%23ffaa55'/%3E%3C/svg%3E";
                targetImg.style.display = 'block';
                targetPlaceholder.style.display = 'none';
            };
            
            levelInfo.innerHTML = `LV ${gameState.currentLevel}/2 | TIME ${Math.floor(timeLimit/60)}:${(timeLimit%60).toString().padStart(2,'0')}`;
            gameState.isSubmitted = false;
            gameState.levelCompleted = false;
            gameState.currentPhoto = null;
            gameState.currentSimilarity = 0;
            similarityMeter.style.display = 'none';
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'none';
            bossBtn.style.display = 'none';
            takePhotoBtn.disabled = false;
            takePhotoBtn.textContent = "📸 CAPTURE";
            startTimer(timeLimit);
        }
        
        function startTimer(seconds) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = seconds;
            updateTimerDisplay();
            gameState.timerInterval = setInterval(() => {
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    if (!gameState.isSubmitted && !gameState.levelCompleted) {
                        handleTimeout();
                    }
                } else {
                    gameState.timer--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(gameState.timer / 60);
            const secs = gameState.timer % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (gameState.timer <= 10) timerDisplay.style.color = "#ff8866";
            else timerDisplay.style.color = "#f7d44a";
        }
        
        function handleTimeout() {
            showToast("⏰ TIME OVER! PRESS RETRY");
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = "🔄 RETRY LEVEL";
        }
        
        // 拍照並像素化處理 (增強8-bit感)
        function takePhoto() {
            if (!gameState.cameraActive) {
                // demo mode 模擬相似度
                const mockSimilarity = Math.floor(55 + Math.random() * 38);
                gameState.currentSimilarity = mockSimilarity;
                displaySimilarity(mockSimilarity);
                submitBtn.disabled = false;
                takePhotoBtn.textContent = "📸 RETRY";
                showToast(`📸 DEMO CAPTURE | ${mockSimilarity}% MATCH`);
                return;
            }
            if (gameState.isSubmitted) { showToast("LEVEL FINISHED", "warning"); return; }
            if (!video.videoWidth) { showToast("CAMERA NOT READY"); return; }
            
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 像素化特效：縮小取樣再放大，實現像素塊效果
            const pixelStep = 4;  // 塊大小
            const smallW = Math.floor(canvas.width / pixelStep);
            const smallH = Math.floor(canvas.height / pixelStep);
            const offCanvas = document.createElement('canvas');
            offCanvas.width = smallW;
            offCanvas.height = smallH;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(canvas, 0, 0, smallW, smallH);
            // 關閉平滑放大
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(offCanvas, 0, 0, smallW, smallH, 0, 0, canvas.width, canvas.height);
            
            gameState.currentPhoto = canvas.toDataURL('image/jpeg', 0.7);
            takePhotoBtn.textContent = "📸 RETRY";
            showToast("📸 PIXEL PHOTO TAKEN! ANALYZING...");
            calculateSimilarity();
        }
        
        function calculateSimilarity() {
            if (gameState.isSubmitted) return;
            // 增加一點隨機趣味，但保留策略 (模擬比對)
            const baseSimilarity = 45 + Math.random() * 48;
            const bonus = Math.min(12, Math.floor(Math.random() * 16));
            let similarity = Math.min(98, baseSimilarity + bonus);
            similarity = Math.floor(similarity);
            gameState.currentSimilarity = similarity;
            displaySimilarity(similarity);
            submitBtn.disabled = false;
        }
        
        function displaySimilarity(percent) {
            similarityMeter.style.display = 'block';
            similarityFill.style.width = percent + '%';
            similarityText.textContent = percent + '%';
            if (percent >= 80) similarityFill.className = 'meter-fill high';
            else if (percent >= 50) similarityFill.className = 'meter-fill medium';
            else similarityFill.className = 'meter-fill low';
        }
        
        function submitMatch() {
            if (gameState.isSubmitted) return;
            let reduction = getReductionBySimilarity(gameState.currentSimilarity);
            const timeBonus = Math.min(1.5, Math.floor(gameState.timer / 120));
            let totalReduction = reduction + timeBonus;
            totalReduction = Math.min(MAX_REDUCTION_PER_LEVEL, totalReduction);
            gameState.energy = Math.max(0, gameState.energy - totalReduction);
            updateEnergyBar();
            
            gameState.isSubmitted = true;
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            showToast(`⚡ ENERGY -${totalReduction.toFixed(1)}% | MATCH ${gameState.currentSimilarity}%`);
            
            if (gameState.currentLevel === 2) {
                showToast("🏆 TRIANGLE RUINS CLEARED!");
                bossBtn.style.display = 'block';
            } else {
                nextLevelBtn.style.display = 'block';
                nextLevelBtn.textContent = "⏭ NEXT LEVEL";
            }
        }
        
        function goToBoss() {
            showToast("🔥 8-BIT BOSS ENCOUNTER...");
            setTimeout(() => {
                // 模擬跳轉，可自行修改成 boss.html
                alert("⚔️ 像素魔王戰 (跳轉至 boss.html) ⚔️\n請自行建立 boss.html 延續傳奇");
                // window.location.href = 'boss.html';
            }, 700);
        }
        
        function updateEnergyBar() {
            const val = Math.max(0, gameState.energy);
            energyFill.style.width = val + '%';
            energyPercent.textContent = Math.floor(val) + '%';
            if(val <= 15) energyFill.style.background = "#ff5f3f";
            else energyFill.style.background = "#ffaa66";
        }
        
        function nextLevel() {
            if (gameState.currentLevel < 2 && gameState.isSubmitted) {
                gameState.currentLevel++;
                startLevel();
            } else if (!gameState.isSubmitted && gameState.timer <= 0) {
                // 重試同一關
                startLevel();
            } else if (gameState.currentLevel === 2 && gameState.isSubmitted) {
                // 最終完成後已經顯示 Boss 按鈕, 此處不做額外
                showToast("✔️ 已完成所有試煉，挑戰魔王吧!");
            } else {
                // 其他情況重啟關卡
                startLevel();
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }
        
        window.addEventListener('beforeunload', () => {
            if (gameState.camera) gameState.camera.getTracks().forEach(t => t.stop());
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        });
    </script>
</body>
</html>
