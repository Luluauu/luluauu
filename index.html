<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - TRIANGLE MISSION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        /* 定義圖片中的核心顏色變量 */
        :root {
            --color-bg-deep: #2c2c2e; /* 來自色板右側的深灰色 */
            --color-bg-main: #3b3a3c; /* 來自色板中間偏右的灰色 */
            --color-text-main: #f5f5f7; /* 用於暗背景的亮灰色 */
            --color-text-dim: #c8c8c8; /* 用於暗背景的次要灰色 */
            --color-accent-blood: #880101; /* 來自色板最左側的鮮血紅 */
            --color-accent-deepred: #602B2C; /* 來自色板中間偏左的深紅褐色 */
            --color-border-main: #585856; /* 來自色板右側的邊框灰 */
            --color-energy-fill: #A32626; /* 用於能量條的警示紅 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Orbitron', sans-serif;
            background: var(--color-bg-deep); /* 使用色板深灰作為總背景 */
            color: var(--color-text-main);
            -webkit-tap-highlight-color: transparent;
        }

        /* 修改為暗色調背景 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--color-bg-deep) 0%, var(--color-bg-main) 100%);
            z-index: -2;
        }

        /* 能量波修改為暗色調中的紅色脈衝 */
        .energy-wave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(136, 1, 1, 0.15) 0%, transparent 70%);
            animation: energyPulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        /* 掃描線顏色淡化，更符合暗色主題 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.01) 0px, rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            padding-bottom: 60px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        /* 狀態欄：暗色背景，紅色邊框，更具攻擊性 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(44, 44, 46, 0.9); /* 使用 var(--color-bg-deep) */
            border: 2px solid var(--color-accent-blood); /* 使用色板最左紅色 */
            margin-bottom: 15px;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(136, 1, 1, 0.3); /* 紅色光暈 */
        }
        .status-bar::before {
            content: 'MISSION';
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--color-bg-deep);
            padding: 0 8px;
            color: var(--color-accent-blood); /* 紅色標籤文字 */
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .level-info span {
            color: var(--color-text-main);
        }

        .energy-container {
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
            color: var(--color-text-main);
            font-weight: bold;
        }
        .energy-label span:first-child {
            color: var(--color-accent-blood); /* "⚡ NEGATIVE ENERGY" 文字變紅 */
        }
        .energy-bar-bg {
            width: 100%;
            height: 20px;
            background: #111; /* 更深的背景色 */
            border: 1px solid var(--color-border-main);
            overflow: hidden;
        }
        /* 能量填充：使用警示紅與深紅的漸變 */
        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--color-energy-fill), var(--color-accent-deepred));
            transition: width 0.3s ease;
        }

        /* 區域標題：暗紅褐色背景，增加神秘感 */
        .location-header {
            text-align: center;
            padding: 15px;
            background: rgba(96, 43, 44, 0.3); /* 使用 var(--color-accent-deepred) 透明化 */
            border: 1px solid var(--color-border-main);
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .location-name {
            font-size: 24px;
            letter-spacing: 3px;
            color: var(--color-text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* 文字發光 */
        }
        .level-badge {
            font-size: 14px;
            color: var(--color-text-dim);
            margin-top: 5px;
        }

        /* 計時器：文字顏色變為鮮紅色 */
        .timer {
            font-size: 48px;
            font-weight: 900;
            color: var(--color-accent-blood);
            text-shadow: 0 0 20px rgba(136, 1, 1, 0.8); /* 強烈紅色發光 */
            text-align: center;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        /* 區域卡片：暗灰色背景，灰色邊框 */
        .area-card {
            background: rgba(59, 58, 60, 0.9); /* 使用 var(--color-bg-main) */
            border: 1px solid var(--color-border-main);
            padding: 15px;
            margin-bottom: 15px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .section-title {
            color: var(--color-text-dim);
            margin-bottom: 10px;
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #111; /* 圖片容器背景加深 */
            border: 1px solid var(--color-border-main);
            overflow: hidden;
            margin-bottom: 10px;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 佔位符：顏色變暗，圖標變為暗紅色 */
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--color-text-dim);
            background: #1a1a1c; /* 更深的灰色佔位背景 */
        }
        .placeholder i { font-size: 40px; color: var(--color-accent-deepred); opacity: 0.8; }

        /* 配對率計：邊框顏色變暗 */
        .similarity-meter {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3); /* 更深的計量背景 */
            border: 1px solid var(--color-border-main);
        }
        .meter-label {
            color: var(--color-text-dim);
        }
        .meter-bar {
            width: 100%;
            height: 12px;
            background: #111; /* 更深的條形背景 */
            border: 1px solid var(--color-border-main);
            overflow: hidden;
            margin: 5px 0;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.3s ease;
        }
        /* 配對率條：使用色板中的不同深紅/灰色 */
        .meter-fill.high { background: var(--color-accent-blood); } /* 高：色板鮮紅 */
        .meter-fill.medium { background: var(--color-accent-deepred); } /* 中：色板深紅褐 */
        .meter-fill.low { background: #555; } /* 低：灰色 */

        /* 按鈕：改為深色背景，灰色邊框，紅色文字 */
        .btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid var(--color-border-main);
            background: #2a2a2c; /* 按鈕深背景色 */
            color: var(--color-text-dim);
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
            -webkit-appearance: none;
        }
        /* 按鈕啟動：背景變為鮮紅，文字變白 */
        .btn:active { background: var(--color-accent-blood); color: #fff; transform: scale(0.98); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #333; color: #555; }

        /* Boss 按鈕：保持原本的鮮紅警示，但強調紅色光暈 */
        #bossBtn {
            background: var(--color-accent-blood);
            color: #ffffff;
            border: 2px solid #fff;
            display: none;
            animation: pulseWarning 1.5s infinite;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0px rgba(136, 1, 1, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(136, 1, 1, 0); }
            100% { box-shadow: 0 0 0 0px rgba(136, 1, 1, 0); }
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #video.visible { display: block; }

        .photo-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .photo-actions .btn {
            flex: 1;
            margin-top: 0;
        }

        /* 退出按鈕：暗灰色背景，灰色文字，紅色邊框 */
        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        .back-button a {
            color: var(--color-text-dim);
            text-decoration: none;
            border: 2px solid var(--color-accent-blood); /* 紅色邊框 */
            padding: 8px 12px;
            font-size: 12px;
            background: rgba(44, 44, 46, 0.9);
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(136, 1, 1, 0.3);
        }

        .bottom-buttons {
            margin-top: 10px;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        /* 吐司通知：保持暗色，白色邊框，紅色文字警示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 12, 0.95);
            border: 2px solid #fff;
            padding: 15px 25px;
            font-size: 16px;
            z-index: 1000;
            display: none;
            text-align: center;
            white-space: nowrap;
            color: var(--color-accent-blood); /* 文字變為鮮紅 */
            font-weight: bold;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }
        .toast.show { display: block; animation: fadeIn 0.3s ease; }

        @keyframes energyPulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.02); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .shake { animation: shake 0.3s ease; }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
        }

        /* 相機狀態顏色修改：在暗場中鮮綠色 */
        #cameraStatus.online { color: #33ff33; text-shadow: 0 0 5px #33ff33; }
        #cameraStatus.offline { color: var(--color-text-dim); }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="energy-wave"></div>
    <div class="scan-line"></div>

    <div class="back-button"><a href="index.html">← EXIT</a></div>

    <div class="game-container">
        <div class="status-bar">
            <div class="level-info">
                <span id="currentLocation">TRIANGLE</span>
            </div>
            <div class="timer" id="timer">--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>⚡ NEGATIVE ENERGY</span><span id="energyPercent">20%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 20%"></div></div>
        </div>

        <div class="location-header" id="locationHeader">
            <div class="location-name">🔺 TRIANGLE AREA</div>
            <div class="level-badge" id="levelInfo">LEVEL 1/2 | TIME: 5:00</div>
        </div>

        <div class="area-card" id="challengeArea">
            <div class="section-title">🎯 TARGET PHOTO</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="width:100%; height:100%; object-fit:cover; display:none;">
                <div class="placeholder" id="targetPlaceholder"><i>📸</i><p>LOADING CHALLENGE...</p></div>
            </div>
        </div>

        <div class="similarity-meter" id="similarityMeter" style="display:none">
            <div class="meter-label">MATCH RATE</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill" style="width:0%"></div></div>
            <div id="similarityText" style="text-align:center; margin-top:5px; color:var(--color-text-dim);">0%</div>
        </div>

        <div class="area-card" id="cameraArea">
            <div class="section-title">📷 YOUR CAMERA</div>
            <div class="image-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>
                <div class="placeholder" id="cameraPlaceholder"><i>📷</i><p>CAMERA OFFLINE</p></div>
            </div>
            <div class="photo-actions">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 CAPTURE</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled>⬆ SUBMIT</button>
            </div>
            <div id="cameraStatus" style="text-align:center; margin-top:10px; font-size:12px">OFFLINE</div>
        </div>

        <div class="bottom-buttons">
            <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none">⏭ NEXT LEVEL</button>
            <button class="btn" id="bossBtn" onclick="goToBoss()">🔥 FIGHT BOSS 🔥</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== 邏輯保持不變 ==========
        const LEVEL_IMAGES = [
            "https://i.postimg.cc/K19QgPF4/IMG-9859.jpg",
            "https://i.postimg.cc/pyDZBbxs/IMG-9861.jpg"
        ];
        
        const LEVEL_TIMES = [300, 240]; 
        const MAX_REDUCTION_PER_LEVEL = 4;
        
        function getReductionBySimilarity(similarity) {
            if (similarity >= 95) return 4.0;
            if (similarity >= 90) return 3.5;
            if (similarity >= 85) return 3.0;
            if (similarity >= 80) return 2.5;
            if (similarity >= 75) return 2.0;
            if (similarity >= 70) return 1.5;
            if (similarity >= 65) return 1.0;
            if (similarity >= 60) return 0.5;
            return 0;
        }
        
        let gameState = {
            currentLevel: 1,
            energy: 20,
            timer: 0,
            timerInterval: null,
            camera: null,
            cameraActive: false,
            currentPhoto: null,
            currentSimilarity: 0,
            isSubmitted: false,
            levelCompleted: false,
            gameActive: false
        };
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const similarityMeter = document.getElementById('similarityMeter');
        const similarityFill = document.getElementById('similarityFill');
        const similarityText = document.getElementById('similarityText');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const submitBtn = document.getElementById('submitBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const bossBtn = document.getElementById('bossBtn'); 
        const timerDisplay = document.getElementById('timer');
        const levelInfo = document.getElementById('levelInfo');
        const energyFill = document.getElementById('energyFill');
        const energyPercent = document.getElementById('energyPercent');
        
        window.addEventListener('load', () => {
            startMatching();
        });
        
        async function startMatching() {
            await initCamera();
            startLevel();
        }
        
        async function initCamera() {
            try {
                showToast("REQUESTING CAMERA ACCESS...");
                const constraints = { video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'environment' } };
                gameState.camera = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = gameState.camera;
                await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                video.classList.add('visible');
                const cameraPlaceholder = document.getElementById('cameraPlaceholder');
                if (cameraPlaceholder) cameraPlaceholder.style.display = 'none';
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                gameState.cameraActive = true;
                const cameraStatus = document.getElementById('cameraStatus');
                if (cameraStatus) {
                    cameraStatus.textContent = 'ONLINE';
                    cameraStatus.className = 'online';
                }
                if (takePhotoBtn) takePhotoBtn.disabled = false;
                showToast("✅ CAMERA READY");
            } catch (error) {
                console.error("Camera error:", error);
                showToast("❌ CAMERA ACCESS DENIED", "error");
            }
        }
        
        function startLevel() {
            const levelIdx = gameState.currentLevel - 1;
            const timeLimit = LEVEL_TIMES[levelIdx];
            const targetUrl = LEVEL_IMAGES[levelIdx];
            targetImg.src = targetUrl;
            targetImg.style.display = 'block';
            targetPlaceholder.style.display = 'none';
            levelInfo.innerHTML = `LEVEL ${gameState.currentLevel}/2 | TIME: ${Math.floor(timeLimit/60)}:${(timeLimit%60).toString().padStart(2,'0')}`;
            gameState.isSubmitted = false;
            gameState.levelCompleted = false;
            gameState.currentPhoto = null;
            gameState.currentSimilarity = 0;
            similarityMeter.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.style.display = 'block';
            nextLevelBtn.style.display = 'none';
            bossBtn.style.display = 'none'; 
            takePhotoBtn.disabled = false;
            takePhotoBtn.textContent = "📸 CAPTURE";
            startTimer(timeLimit);
        }
        
        function startTimer(seconds) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = seconds;
            updateTimerDisplay();
            gameState.timerInterval = setInterval(() => {
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    if (!gameState.isSubmitted && !gameState.levelCompleted) {
                        handleTimeout();
                    }
                } else {
                    gameState.timer--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(gameState.timer / 60);
            const secs = gameState.timer % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            // 暗場中倒數顏色鮮豔化
            if (gameState.timer <= 10) timerDisplay.style.color = "#ffdd00"; /* 時間緊迫變黃 */
            else timerDisplay.style.color = "var(--color-accent-blood)";
        }
        
        function handleTimeout() {
            showToast("⏰ TIME'S UP! LEVEL FAILED", "error");
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = "🔄 RETRY LEVEL";
        }
        
        function takePhoto() {
            if (!gameState.cameraActive) { showToast("CAMERA OFFLINE", "error"); return; }
            if (gameState.isSubmitted) { showToast("LEVEL ALREADY COMPLETED", "warning"); return; }
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            gameState.currentPhoto = canvas.toDataURL('image/jpeg', 0.95);
            takePhotoBtn.textContent = "📸 RETRY";
            showToast("📸 PHOTO TAKEN! CALCULATING...");
            calculateSimilarity();
        }
        
        function calculateSimilarity() {
            if (gameState.isSubmitted) return;
            const baseSimilarity = 40 + Math.random() * 50;
            const attemptBonus = Math.min(15, Math.floor(Math.random() * 20));
            let similarity = Math.min(98, baseSimilarity + attemptBonus);
            similarity = Math.floor(similarity);
            gameState.currentSimilarity = similarity;
            displaySimilarity(similarity);
            submitBtn.disabled = false;
        }
        
        function displaySimilarity(percent) {
            similarityMeter.style.display = 'block';
            similarityFill.style.width = percent + '%';
            similarityText.textContent = percent + '%';
            if (percent >= 80) similarityFill.className = 'meter-fill high';
            else if (percent >= 50) similarityFill.className = 'meter-fill medium';
            else similarityFill.className = 'meter-fill low';
        }
        
        function submitMatch() {
            if (gameState.isSubmitted) return;
            let reduction = getReductionBySimilarity(gameState.currentSimilarity);
            const timeBonus = Math.min(1.5, Math.floor(gameState.timer / 120));
            let totalReduction = reduction + timeBonus;
            totalReduction = Math.min(MAX_REDUCTION_PER_LEVEL, totalReduction);
            gameState.energy = Math.max(0, gameState.energy - totalReduction);
            updateEnergyBar();
            
            gameState.isSubmitted = true;
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            if (gameState.currentLevel === 2) {
                showToast("🏆 TRIANGLE AREA COMPLETED!");
                bossBtn.style.display = 'block'; 
            } else {
                nextLevelBtn.style.display = 'block';
                nextLevelBtn.textContent = "⏭ NEXT LEVEL";
            }
        }

        function goToBoss() {
            showToast("🚀 INITIATING BOSS BATTLE...");
            setTimeout(() => {
                window.location.href = 'boss.html'; 
            }, 1000);
        }
        
        function updateEnergyBar() {
            energyFill.style.width = gameState.energy + '%';
            energyPercent.textContent = Math.floor(gameState.energy) + '%';
        }
        
        function nextLevel() {
            if (gameState.currentLevel < 2) {
                gameState.currentLevel++;
                startLevel();
            }
        }
        
        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.addEventListener('beforeunload', () => {
            if (gameState.camera) gameState.camera.getTracks().forEach(t => t.stop());
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        });
    </script>
</body>
</html>
