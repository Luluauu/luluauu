<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Story</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-accent: #a8d56f;
            --pixel-text: #2d4a22;
            
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--pixel-bg);
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .character-container {
            position: absolute; bottom: 25vh; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 5%; pointer-events: none; z-index: 5;
        }

        .character {
            width: 45vw; max-width: 280px; height: auto;
            transition: all 0.2s steps(2);
            filter: brightness(0.6) grayscale(0.4);
            transform: scale(0.9); opacity: 0.8;
        }

        .character.active {
            filter: brightness(1) grayscale(0);
            transform: scale(1.1); opacity: 1; z-index: 10;
        }

        .pixel-dialogue {
            position: absolute; bottom: 30px; left: 5%; width: 90%;
            min-height: 140px; background: rgba(255, 254, 240, 0.98);
            border: 4px solid var(--pixel-border);
            box-shadow: 0 4px 0 -1px var(--pixel-border), 0 -4px 0 -1px var(--pixel-border),
                        4px 0 0 -1px var(--pixel-border), -4px 0 0 -1px var(--pixel-border);
            padding: 15px; z-index: 20;
        }

        .name-tag {
            font-size: 22px; color: white; background: var(--pixel-accent);
            padding: 2px 10px; border: 2px solid var(--pixel-border);
            position: absolute; top: -20px; left: 10px;
        }

        .message {
            font-size: 26px; color: var(--pixel-text);
            line-height: 1.1; margin-top: 5px;
        }

        .next-hint {
            position: absolute; right: 15px; bottom: 10px;
            font-size: 18px; color: var(--pixel-accent);
            animation: bounce 0.6s steps(2) infinite;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        #summary-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--pixel-bg);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; z-index: 100;
        }

        .mission-box {
            border: 6px solid var(--pixel-border);
            background: white; padding: 25px; width: 85%;
            text-align: center; box-shadow: 6px 6px 0 var(--pixel-border);
        }

        .mission-title { font-size: 36px; color: #d32f2f; margin-bottom: 15px; }
        .mission-text { font-size: 24px; color: var(--pixel-text); line-height: 1.3; margin-bottom: 10px; }
        
        .start-btn {
            margin-top: 20px; padding: 10px 20px;
            background: var(--pixel-accent); color: white;
            border: 4px solid var(--pixel-border);
            font-family: 'VT323', monospace; font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="handleScreenClick()">

    <div class="background"></div>

    <div class="character-container">
        <img id="camel" class="character" src="Camel.png">
        <img id="shuchong" class="character" src="Bookworm.png">
    </div>

    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">...</div>
        <div class="message" id="message-text">...</div>
        <div class="next-hint">TAP TO NEXT ➔</div>
    </div>

    <div id="summary-screen">
        <div class="mission-box">
            <h1 class="mission-title">MISSION BRIEF</h1>
            <p class="mission-text">
                <b>Class-Off Camel</b> is trapped in an endless class!<br><br>
                He needs a drink to survive this 4-hour lecture.<br>
                Help <b>Bookworm</b> find the drink in the <b>TRIANGLE AREA</b>!<br><br>
                Go find the items and save him!
            </p>
            <button class="start-btn" onclick="window.location.href='camera_game.html'">START MISSION</button>
        </div>
    </div>

    <script>
        const story = [
            { 
                name: "幾時駱駝(Class-Off Camel)", 
                text: "When end the class… When end the class… x100", 
                active: "camel" 
            },
            { 
                name: "書蟲(Bookworm)", 
                text: "Why is he here just saying his own name? ", 
                active: "shuchong" 
            },
            { 
                name: "書蟲(Bookworm)", 
                text: "(listen carefully)", 
                active: "shuchong" 
            },
            { 
                name: "幾時駱駝(Class-Off Camel)", 
                text: "When end the class… When end the class… x100", 
                active: "camel" 
            },
            { 
                name: "書蟲(Bookworm)", 
                text: "Oh... so it turns out he wasn't saying his own name（幾時駱駝）, but rather When will end the class （幾時落堂）…", 
                active: "shuchong" 
            },
            { 
                name: "幾時駱駝(Class-Off Camel)", 
                text: "(suddenly) Did you know we've already been in class for four hours?", 
                active: "camel" 
            },
            { 
                name: "書蟲(Bookworm)", 
                text: "...", 
                active: "shuchong" 
            },
            { 
                name: "幾時駱駝(Class-Off Camel)", 
                text: "Could you help me go out and get some drink?", 
                active: "camel" 
            },
            { 
                name: "書蟲(Bookworm)", 
                text: "o…ok", 
                active: "shuchong" 
            }
        ];

        let currentLine = 0;
        let storyFinished = false;

        function updateUI() {
            if (currentLine < story.length) {
                const line = story[currentLine];
                document.getElementById('speaker-name').innerText = line.name;
                document.getElementById('message-text').innerText = line.text;
                
                document.getElementById('camel').classList.toggle('active', line.active === 'camel');
                document.getElementById('shuchong').classList.toggle('active', line.active === 'shuchong');
            } else {
                storyFinished = true;
                document.getElementById('dialogue-box').style.display = 'none';
                document.getElementById('summary-screen').style.display = 'flex';
            }
        }

        function handleScreenClick() {
            if (!storyFinished) {
                currentLine++;
                updateUI();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
