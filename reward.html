<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Reward</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: #1a0b0b;
            color: #d9c8b2;
            -webkit-tap-highlight-color: transparent;
        }

        /* 像素噪点背景 + 深红色调网格 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #2a1212 0px, #2a1212 2px,
                #1f0c0c 2px, #1f0c0c 4px
            );
            z-index: -2;
        }

        /* 扫描线 + 红色像素波纹 */
        .energy-wave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                rgba(180, 40, 40, 0.08) 0px,
                rgba(180, 40, 40, 0.08) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: -1;
            animation: pixelShift 8s steps(4) infinite;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 10;
        }

        @keyframes pixelShift {
            0% { background-position: 0 0; }
            100% { background-position: 8px 0; }
        }

        .reward-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding-bottom: 100px;
            position: relative;
            z-index: 1;
        }

        /* 駱駝圖片 */
        .camel-display {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
            image-rendering: pixelated;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* RPG 對話框樣式 - 深紅像素風格 */
        .pixel-dialogue {
            position: absolute;
            bottom: 30px;
            left: 5%;
            width: 90%;
            min-height: 140px;
            background: rgba(30, 15, 15, 0.98);
            border: 4px solid #8b3a3a;
            box-shadow: 0 4px 0 -1px #5a2525, 0 -4px 0 -1px #5a2525, 4px 0 0 -1px #5a2525, -4px 0 0 -1px #5a2525;
            padding: 15px;
            z-index: 20;
            border-radius: 0;
        }

        .name-tag {
            font-size: 12px;
            color: white;
            background: #8b3a3a;
            padding: 4px 12px;
            border: 2px solid #5a2525;
            position: absolute;
            top: -16px;
            left: 15px;
            font-family: 'Press Start 2P', monospace;
        }

        .message {
            font-size: 11px;
            color: #f0d0d0;
            line-height: 1.5;
            margin-top: 10px;
            font-family: 'Press Start 2P', monospace;
        }

        .next-btn {
            position: absolute;
            right: 15px;
            bottom: 10px;
            background: #8b3a3a;
            border: 2px solid #5a2525;
            color: white;
            font-size: 12px;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            transition: all 0.05s linear;
        }

        .next-btn:active {
            transform: translate(2px, 2px);
        }

        /* 彈出視窗 (Modal) */
        #reward-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .item-card {
            background: #1e0c0c;
            border: 6px solid #8b3a3a;
            padding: 30px;
            width: 85%;
            text-align: center;
            box-shadow: 0 0 0 4px #2a1212, 0 0 0 8px #5a2525;
        }

        /* 道具視覺容器 */
        .sugar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sugar-img {
            width: 120px;
            height: auto;
            z-index: 10;
            position: relative;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8));
            animation: itemFloat 2s ease-in-out infinite;
            image-rendering: pixelated;
        }

        @keyframes itemFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 閃光效果 (Sparkles) */
        .sparkle {
            position: absolute;
            background: radial-gradient(circle, #ffffff, #ffffaa);
            width: 16px;
            height: 16px;
            clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
            animation: blinkSparkle 0.8s infinite alternate;
            z-index: 15;
            box-shadow: 0 0 8px rgba(255, 255, 200, 0.9);
        }

        .s1 { top: 5%; left: 15%; animation-delay: 0.1s; }
        .s2 { top: 15%; right: 10%; animation-delay: 0.3s; transform: scale(1.3); }
        .s3 { bottom: 15%; left: 10%; animation-delay: 0.5s; transform: scale(1.1); }
        .s4 { bottom: 5%; right: 15%; animation-delay: 0.2s; }
        .s5 { top: 40%; left: -5%; animation-delay: 0.4s; transform: scale(1.5); }
        .s6 { top: 55%; right: -8%; animation-delay: 0.6s; transform: scale(1.4); }
        .s7 { top: 70%; left: 30%; animation-delay: 0.15s; transform: scale(0.9); }
        .s8 { bottom: 40%; right: 25%; animation-delay: 0.45s; transform: scale(1.2); }
        .s9 { top: 10%; right: 30%; animation-delay: 0.7s; transform: scale(1); }
        .s10 { bottom: 10%; left: 35%; animation-delay: 0.35s; transform: scale(1.1); }

        @keyframes blinkSparkle {
            0%, 100% { transform: scale(0.2); opacity: 0; }
            30% { transform: scale(0.8); opacity: 0.6; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0.3; }
        }

        /* 圓形光暈背景 */
        .glow-bg {
            position: absolute;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, 
                rgba(255, 255, 150, 0.8) 0%, 
                rgba(255, 255, 100, 0.5) 30%,
                rgba(255, 200, 50, 0.3) 60%,
                rgba(255, 255, 255, 0) 100%);
            animation: pulseGlow 1.2s infinite ease-in-out;
            z-index: 1;
            border-radius: 50%;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* 旋轉光環 */
        .rotate-ring {
            position: absolute;
            width: 170px;
            height: 170px;
            border: 2px solid rgba(255, 255, 150, 0.7);
            border-radius: 50%;
            animation: rotateRing 3s linear infinite;
            z-index: 2;
            box-shadow: 0 0 15px rgba(255, 255, 150, 0.5);
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .modal-title {
            color: #e67e7e;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            font-family: 'Press Start 2P', monospace;
        }

        .modal-text {
            font-size: 16px;
            color: #d9c8b2;
            line-height: 1.5;
            margin-bottom: 20px;
            font-family: 'Press Start 2P', monospace;
        }

        .fight-btn {
            background: #8b3a3a;
            border: 3px solid #5a2525;
            color: white;
            padding: 10px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.05s linear;
        }

        .fight-btn:active {
            transform: translate(2px, 2px);
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            background: #1f0c0c;
        }
        ::-webkit-scrollbar-thumb {
            background: #8c3434;
            border: 1px solid #411717;
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="energy-wave"></div>
    <div class="scan-line"></div>

    <div class="reward-scene">
        <img src="Camel.png" alt="Camel" class="camel-display">
        
        <div class="pixel-dialogue">
            <div class="name-tag">幾時駱駝</div>
            <div class="message">
                Thank for the drink. (He's put some sugar in it)<br>
                Have a drink, I've put some sugar in it for you.
            </div>
            <button class="next-btn" onclick="showModal()">→</button>
        </div>
    </div>

    <div id="reward-modal">
        <div class="item-card">
            <div class="sugar-container">
                <div class="glow-bg"></div>
                <div class="rotate-ring"></div>
                
                <div class="sparkle s1"></div>
                <div class="sparkle s2"></div>
                <div class="sparkle s3"></div>
                <div class="sparkle s4"></div>
                <div class="sparkle s5"></div>
                <div class="sparkle s6"></div>
                <div class="sparkle s7"></div>
                <div class="sparkle s8"></div>
                <div class="sparkle s9"></div>
                <div class="sparkle s10"></div>
                
                <img src="sugar.png" alt="Sugar" class="sugar-img">
            </div>
            
            <div class="modal-title">Sugar got!</div>
            <div class="modal-text">
                Please keep it until the final war with the villain…<br>
                Please move to the next location.
            </div>
            <button class="fight-btn" onclick="goToBoss()">FIGHT</button>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('reward-modal').style.display = 'flex';
        }

        function goToBoss() {
            window.location.href = 'boss.html';
        }
    </script>
</body>
</html>
